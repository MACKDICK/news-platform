name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      - name: Capacitor Sync
        working-directory: ./frontend
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # CONFIGURACIÓN INTEGRADA: Creamos el keystore y dejamos que Gradle compile y firme con esquemas V2/V3 nativamente
      - name: Build and Sign APK with Gradle
        working-directory: ./frontend/android
        run: |
          # 1. Generar la firma de depuración estándar en la carpeta de Android
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Dar permisos y compilar. Gradle usará este keystore e inyectará los esquemas V2 y V3 automáticamente.
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.bundle.enableSplit=false

      # Subimos el APK nativo generado por Gradle que ya incluye las firmas necesarias
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
