name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Indicamos que busque el package.json dentro de tu subcarpeta
      - name: Install dependencies
        defaults:
          run:
            working-directory: news-platform
        run: npm install --legacy-peer-deps

      # Indicamos que compile React dentro de tu subcarpeta
      - name: Build React
        defaults:
          run:
            working-directory: news-platform
        run: npm run build

      # Indicamos que sincronice Capacitor dentro de tu subcarpeta
      - name: Capacitor Sync
        defaults:
          run:
            working-directory: news-platform
        run: |
          npx cap add android || true
          npx cap sync android

      # Java se configura de forma global, no necesita subcarpeta
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Entramos a la ruta correcta de android para compilar el APK
      - name: Build APK
        run: |
          cd news-platform/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Subimos el APK final ajustando también su ruta con la subcarpeta
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: news-platform/android/app/build/outputs/apk/debug/app-debug.apk
