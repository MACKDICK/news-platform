name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Definimos la carpeta del proyecto una sola vez para todo el proceso
    defaults:
      run:
        working-directory: news-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Como ya estamos dentro de 'news-platform', solo entramos a 'android'
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Ajustamos la ruta relativa para encontrar y subir el APK generado
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: news-platform/android/app/build/outputs/apk/debug/app-debug.apk
