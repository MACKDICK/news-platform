name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bajamos a Node 20 para máxima compatibilidad con proyectos React/Capacitor actuales
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Usamos 'npm ci' en lugar de 'npm install' para evitar errores de dependencias en servidores limpios
      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build React
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
