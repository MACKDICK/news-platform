name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      - name: Capacitor Sync
        working-directory: ./frontend
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.bundle.enableSplit=false

      # COMANDO MANUAL CORRECTO: Encuentra la versión real de build-tools en el servidor y firma el APK
      - name: Sign APK manually
        run: |
          # 1. Encontrar la ruta real de apksigner y zipalign instalada en el servidor de GitHub
          BUILD_TOOLS_DIR=$(dirname $(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1))
          echo "Usando las herramientas de Android ubicadas en: $BUILD_TOOLS_DIR"
          
          # 2. Generar una llave de depuración (Keystore) estándar en la raíz del servidor
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 3. Alinear el APK generado por Gradle
          $BUILD_TOOLS_DIR/zipalign -v 4 frontend/android/app/build/outputs/apk/debug/app-debug.apk app-aligned.apk
          
          # 4. Firmar digitalmente el APK para que Android lo reconozca como válido
          $BUILD_TOOLS_DIR/apksigner sign --keystore debug.keystore --storepass android --keypass android --out NewsPlatform-Instalable.apk app-aligned.apk

      # Subimos el APK que ya contiene la firma digital verificada
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: NewsPlatform-Instalable.apk
