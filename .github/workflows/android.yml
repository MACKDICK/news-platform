name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      # REGRESAMOS A JAVA 21: Es la versión obligatoria que tu proyecto exige para inicializarse
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Initialize Capacitor Android
        working-directory: ./frontend
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap add android || true
          npx cap sync android

      # COMPILACIÓN FORZADA: Agregamos parámetros para obligar a Java 21 a generar bytecode compatible con Android 11
      - name: Build APK with Gradle
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Pandroid.bundle.enableSplit=false

      # Subimos dinámicamente cualquier APK generado
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: frontend/android/app/build/outputs/**/*.apk
