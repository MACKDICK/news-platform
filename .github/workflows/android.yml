name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      - name: Capacitor Sync
        working-directory: ./frontend
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.bundle.enableSplit=false

      # Método nativo de Java para firmar archivos de forma directa y limpia
      - name: Sign APK manually
        run: |
          # 1. Crear el almacen de llaves temporal
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Firmar el archivo APK usando las herramientas nativas de Java
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -storepass android -keypass android frontend/android/app/build/outputs/apk/debug/app-debug.apk androiddebugkey
          
          # 3. Mover y renombrar el archivo firmado a la raíz para la descarga
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk NewsPlatform-Instalable.apk

      # Subimos el archivo final verificado
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: NewsPlatform-Instalable.apk
