name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      - name: Capacitor Sync
        working-directory: ./frontend
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.bundle.enableSplit=false

      # SECCIÓN CORREGIDA: Busca dinámicamente apksigner para inyectar firma V2/V3 requerida por Android 11
      - name: Sign APK with V2/V3 Scheme
        run: |
          # 1. Localizar la carpeta build-tools más reciente del servidor
          BUILD_TOOLS_DIR=$(dirname $(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1))
          echo "Usando herramientas de Android en: $BUILD_TOOLS_DIR"
          
          # 2. Generar el almacén de llaves temporal de depuración
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 3. Alinear el archivo APK (Paso obligatorio antes de usar apksigner)
          $BUILD_TOOLS_DIR/zipalign -v 4 frontend/android/app/build/outputs/apk/debug/app-debug.apk app-aligned.apk
          
          # 4. Firmar con apksigner (Aplica firma V2/V3 nativa)
          $BUILD_TOOLS_DIR/apksigner sign --keystore debug.keystore --storepass android --keypass android --out NewsPlatform-Redmi.apk app-aligned.apk

      # Subimos el APK listo para Android 11
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsPlatform-APK
          path: NewsPlatform-Redmi.apk
